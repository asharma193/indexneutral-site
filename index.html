<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Empathy Agent - QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-y: auto;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fa;
            color: #2d3436;
        }

        .qr-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .qr-content {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border: 1px solid #e9ecef;
            padding: 25px;
            width: 100%;
            max-width: 100%;
            text-align: center;
        }

        h1 {
            color: #2d3436;
            font-size: 1.5rem;
            margin: 0 0 5px 0;
            font-weight: 600;
        }

        .subtitle {
            color: #6c757d;
            margin: 0 0 25px 0;
            font-size: 0.95rem;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin: 25px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        #qrcode img {
            max-width: 100%;
            height: auto;
        }

        .url-display {
            background: #e9ecef;
            padding: 12px;
            border-radius: 8px;
            margin: 20px 0;
            word-break: break-all;
            font-size: 0.75rem;
            color: #495057;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        .download-btn {
            background: #495057;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
            font-size: 1rem;
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
        }

        .download-btn:active {
            background: #343a40;
        }

        .instructions {
            text-align: left;
            background: #f1f3f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #4dabf7;
            font-size: 0.9rem;
        }

        .instructions h3 {
            margin: 0 0 8px 0;
            color: #1c7ed6;
            font-size: 0.95rem;
        }

        .instructions ol {
            margin: 5px 0;
            padding-left: 20px;
        }

        .instructions li {
            margin: 5px 0;
            color: #495057;
            font-size: 0.85rem;
        }

        .features {
            text-align: left;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .features h3 {
            color: #2d3436;
            margin: 0 0 8px 0;
            font-size: 0.95rem;
        }

        .features ul {
            margin: 5px 0;
            padding-left: 20px;
        }

        .features li {
            margin: 4px 0;
            color: #495057;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="qr-container">
    <div class="qr-content">
        <h1>Empathy Agent</h1>
        <p class="subtitle">Scan to chat</p>

        <div id="qrcode"></div>

        <div class="url-display">
            https://asharma193.github.io/indexneutral-site/Indexneutral.html
        </div>

        <button class="download-btn" onclick="downloadQR()">📥 Download QR</button>

        <div class="instructions">
            <h3>How to Use:</h3>
            <ol>
                <li>Scan with phone camera</li>
                <li>Open link</li>
                <li>Chat with agent</li>
            </ol>
        </div>

        <div class="features">
            <h3>✨ Features:</h3>
            <ul>
                <li>Sentiment Analysis</li>
                <li>Negation Logic</li>
                <li>Adaptive Responses</li>
                <li>System Transparency</li>
            </ul>
        </div>
    </div>
</div>

<script>
    // Generate QR code
    const url = "https://asharma193.github.io/indexneutral-site/Indexneutral.html";
    new QRCode(document.getElementById("qrcode"), {
        text: url,
        width: 280,
        height: 280,
        colorDark: "#2d3436",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });

    // Download QR code as image
    function downloadQR() {
        const canvas = document.querySelector('#qrcode canvas');
        if (canvas) {
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = 'empathy-agent-qr.png';
            link.click();
        }
    }
</script>

</body>
</html>
