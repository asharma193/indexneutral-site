<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simulated Empathy Agent</title>
    <style>
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fa;
            color: #2d3436;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            padding: 0;
            margin: 0;
            background: #ffffff;
        }

        .header {
            padding: 15px 20px;
            background: #ffffff;
            border-bottom: 1px solid #e9ecef;
            flex-shrink: 0;
        }

        h2 {
            text-align: center;
            color: #2d3436;
            margin: 0;
            font-weight: 600;
            font-size: 1.3rem;
            letter-spacing: -0.5px;
        }

        #output-window {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #ffffff;
            border: none;
            margin: 0;
            font-size: 0.95rem;
            -webkit-overflow-scrolling: touch;
        }

        /* Message Bubbles */
        #output-window p {
            margin: 8px 0;
            padding: 10px 14px;
            border-radius: 8px;
            max-width: 85%;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-msg {
            background: #e9ecef;
            margin-left: auto;
            color: #212529;
            border-radius: 12px;
            max-width: 85%;
        }

        .agent-msg {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            color: #495057;
            margin-right: auto;
            max-width: 85%;
        }

        .input-section {
            padding: 12px;
            background: #ffffff;
            border-top: 1px solid #e9ecef;
            flex-shrink: 0;
            display: flex;
            gap: 8px;
        }

        .input-area {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        input {
            flex-grow: 1;
            padding: 10px 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            outline: none;
            font-size: 1rem;
            font-family: inherit;
            -webkit-appearance: none;
            appearance: none;
        }

        input:focus {
            border-color: #4dabf7;
        }

        button {
            padding: 10px 16px;
            cursor: pointer;
            background: #495057;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: background 0.2s;
            -webkit-appearance: none;
            appearance: none;
            white-space: nowrap;
        }

        button:active {
            background: #343a40;
        }

        .toggle-btn {
            background: #dee2e6;
            color: #495057;
            width: 100%;
            border: 1px solid #ced4da;
            padding: 12px;
            font-size: 0.9rem;
            margin: 0;
        }

        .toggle-btn:active {
            background: #ced4da;
        }

        /* Transparency Mode Styles */
        #transparency-panel {
            display: none;
            padding: 15px;
            background: #f1f3f5;
            color: #495057;
            border-top: 1px solid #dee2e6;
            font-size: 0.8rem;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            max-height: 200px;
            overflow-y: auto;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }

        .logic-label {
            font-weight: bold;
            color: #1c7ed6;
            display: inline-block;
            min-width: 120px;
        }

        #transparency-panel p {
            margin: 6px 0;
            padding: 0;
            background: none;
            border: none;
            max-width: 100%;
        }

        #transparency-panel h3 {
            margin: 0 0 8px 0;
            font-size: 0.9rem;
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 6px;
        }

        /* Scrollbar styling for mobile */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h2>Empathy Agent</h2>
    </div>

    <div id="output-window">
        <p class="agent-msg"><em>Agent: Hello. How are you feeling today?</em></p>
    </div>

    <div class="input-section">
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your response..." onkeypress="if(event.key==='Enter') processInput()">
            <button onclick="processInput()">Send</button>
        </div>
    </div>

    <button class="toggle-btn" onclick="toggleTransparency()">View System Logic</button>

    <div id="transparency-panel">
        <h3>System Processing Logs</h3>
        <p><span class="logic-label">Tokens:</span> <span id="logic-tokens">-</span></p>
        <p><span class="logic-label">Keywords:</span> <span id="logic-keywords">-</span></p>
        <p><span class="logic-label">Negation:</span> <span id="logic-negation">No</span></p>
        <p><span class="logic-label">Classification:</span> <span id="logic-scores">-</span></p>
    </div>
</div>

<script>
    const lexicon = {
        "happy": "Positive", "good": "Positive", "elated": "Positive", "great": "Positive",
        "sad": "Negative", "stressed": "Negative", "anxious": "Negative", "depressed": "Negative", "bad": "Negative"
    };

    const negations = ["not", "never", "no", "don't"];

    function processInput() {
        const inputField = document.getElementById('user-input');
        const text = inputField.value.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
        if (!text) return;

        const tokens = text.split(/\s+/);
        let scores = { Positive: 0, Negative: 0 };
        let detected = [];
        let negationFound = false;

        tokens.forEach((word, index) => {
            if (negations.includes(word)) negationFound = true;

            if (lexicon[word]) {
                let category = lexicon[word];
                const context = tokens.slice(Math.max(0, index - 2), index);
                if (context.some(t => negations.includes(t))) {
                    category = (category === "Positive") ? "Negative" : "Positive";
                }
                scores[category] += 1;
                detected.push(word);
            }
        });

        displayResponse(inputField.value, scores);
        updateTransparency(tokens, detected, negationFound, scores);
        inputField.value = "";
        inputField.focus();
    }

    function displayResponse(userInput, scores) {
        const out = document.getElementById('output-window');
        let botMsg = "I hear you. Can you tell me more about that?";

        if (scores.Positive > scores.Negative) {
            botMsg = "It sounds like you are in a good place. What is contributing to this feeling?";
        } else if (scores.Negative > scores.Positive) {
            botMsg = "I'm sorry you're feeling that way. It sounds difficult. How long have you felt this?";
        }

        out.innerHTML += `<p class="user-msg"><strong>You:</strong> ${userInput}</p>`;
        out.innerHTML += `<p class="agent-msg"><strong>Agent:</strong> ${botMsg}</p>`;
        out.scrollTop = out.scrollHeight;
    }

    function updateTransparency(tokens, keywords, neg, scores) {
        document.getElementById('logic-tokens').innerText = `[${tokens.join(', ')}]`;
        document.getElementById('logic-keywords').innerText = keywords.join(", ") || "None";
        document.getElementById('logic-negation').innerText = neg ? "Yes" : "No";

        let finalDecision = "Neutral";
        if (scores.Positive > scores.Negative) finalDecision = "Positive";
        if (scores.Negative > scores.Positive) finalDecision = "Negative";
        document.getElementById('logic-scores').innerText = finalDecision;
    }

    function toggleTransparency() {
        const panel = document.getElementById('transparency-panel');
        panel.style.display = (panel.style.display === 'none' || panel.style.display === '') ? 'block' : 'none';
    }

    // Prevent zoom
    document.addEventListener('touchmove', function(e) {
        if (e.touches.length > 1) {
            e.preventDefault();
        }
    }, false);
</script>

</body>
</html>
