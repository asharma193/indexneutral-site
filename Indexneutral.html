<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simulated Empathy: Rule-Based Agent</title>
    <style>
        /* Neutral Minimalist Theme */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #f8f9fa; 
            padding: 40px 20px; 
            margin: 0;
            color: #2d3436;
        }
        
        .chat-container { 
            max-width: 650px; 
            margin: auto; 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #e9ecef;
        }

        h2 {
            text-align: center;
            color: #2d3436;
            margin-top: 0;
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }
        
        #output-window { 
            height: 380px; 
            overflow-y: auto; 
            border: 1px solid #dee2e6; 
            padding: 20px; 
            margin-bottom: 25px; 
            background: #ffffff; 
            border-radius: 8px;
            font-size: 0.95em;
        }

        /* Message Bubbles */
        #output-window p {
            margin: 12px 0;
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 80%;
            line-height: 1.5;
        }

        .user-msg {
            background: #e9ecef;
            margin-left: auto;
            color: #212529;
        }

        .agent-msg {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            color: #495057;
        }

        .input-area { display: flex; gap: 10px; }
        
        input { 
            flex-grow: 1; 
            padding: 12px 16px; 
            border: 1px solid #ced4da; 
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        input:focus { border-color: #4dabf7; }

        button { 
            padding: 10px 24px; 
            cursor: pointer; 
            background: #495057; 
            color: #ffffff; 
            border: none; 
            border-radius: 6px;
            font-weight: 500;
            transition: background 0.2s;
        }
        
        button:hover { background: #343a40; }

        .toggle-btn {
            background: #dee2e6;
            color: #495057;
            width: 100%;
            margin-top: 20px;
            border: 1px solid #ced4da;
        }
        .toggle-btn:hover { background: #ced4da; }

        /* Transparency Mode Styles */
        #transparency-panel { 
            display: none; 
            margin-top: 20px; 
            padding: 20px; 
            background: #f1f3f5; 
            color: #495057;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            font-size: 0.85em; 
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }
        
        .logic-label { font-weight: bold; color: #1c7ed6; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>Simulated Empathy Agent</h2>
    
    <div id="output-window">
        <p class="agent-msg"><em>Agent: Hello. How are you feeling today?</em></p>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your response..." onkeypress="if(event.key==='Enter') processInput()">
        <button onclick="processInput()">Send</button>
    </div>

    <button class="toggle-btn" onclick="toggleTransparency()">View System Logic</button>

    <div id="transparency-panel">
        <h3 style="margin-top:0; font-size: 1rem; border-bottom: 1px solid #dee2e6; padding-bottom: 8px;">System Processing Logs</h3>
        <p><span class="logic-label">Tokens:</span> <span id="logic-tokens">-</span></p>
        <p><span class="logic-label">Detected Keywords:</span> <span id="logic-keywords">-</span></p>
        <p><span class="logic-label">Negation Detected:</span> <span id="logic-negation">No</span></p>
        <p><span class="logic-label">Final Classification:</span> <span id="logic-scores">-</span></p>
    </div>
</div>

<script>
    const lexicon = {
        "happy": "Positive", "good": "Positive", "elated": "Positive", "great": "Positive",
        "sad": "Negative", "stressed": "Negative", "anxious": "Negative", "depressed": "Negative", "bad": "Negative"
    };

    const negations = ["not", "never", "no", "don't"];

    function processInput() {
        const inputField = document.getElementById('user-input');
        const text = inputField.value.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
        if (!text) return;

        const tokens = text.split(/\s+/);
        let scores = { Positive: 0, Negative: 0 };
        let detected = [];
        let negationFound = false;

        tokens.forEach((word, index) => {
            if (negations.includes(word)) negationFound = true;

            if (lexicon[word]) {
                let category = lexicon[word];
                // Inversion Logic
                const context = tokens.slice(Math.max(0, index - 2), index);
                if (context.some(t => negations.includes(t))) {
                    category = (category === "Positive") ? "Negative" : "Positive";
                }
                scores[category] += 1;
                detected.push(word);
            }
        });

        displayResponse(inputField.value, scores);
        updateTransparency(tokens, detected, negationFound, scores);
        inputField.value = "";
    }

    function displayResponse(userInput, scores) {
        const out = document.getElementById('output-window');
        let botMsg = "I hear you. Can you tell me more about that?"; 

        if (scores.Positive > scores.Negative) {
            botMsg = "It sounds like you are in a good place. What is contributing to this feeling?";
        } else if (scores.Negative > scores.Positive) {
            botMsg = "I'm sorry you're feeling that way. It sounds difficult. How long have you felt this?";
        }

        out.innerHTML += `<p class="user-msg"><strong>You:</strong> ${userInput}</p>`;
        out.innerHTML += `<p class="agent-msg"><strong>Agent:</strong> ${botMsg}</p>`;
        out.scrollTop = out.scrollHeight;
    }

    function updateTransparency(tokens, keywords, neg, scores) {
        document.getElementById('logic-tokens').innerText = `[${tokens.join(', ')}]`;
        document.getElementById('logic-keywords').innerText = keywords.join(", ") || "None";
        document.getElementById('logic-negation').innerText = neg ? "Yes (Rules applied)" : "No";
        
        let finalDecision = "Neutral";
        if (scores.Positive > scores.Negative) finalDecision = "Positive";
        if (scores.Negative > scores.Positive) finalDecision = "Negative";
        document.getElementById('logic-scores').innerText = finalDecision.toUpperCase();
    }

    function toggleTransparency() {
        const panel = document.getElementById('transparency-panel');
        panel.style.display = (panel.style.display === 'none' || panel.style.display === '') ? 'block' : 'none';
    }
</script>
</body>
</html>
